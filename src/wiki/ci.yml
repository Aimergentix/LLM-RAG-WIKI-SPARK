name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-dev.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Run Pytest
        run: pytest

      - name: Check project.toml consistency
        run: |
          python3 -c "
          import tomllib, re
          with open('project.toml', 'rb') as f:
              p = tomllib.load(f)['project']
          deps = list(p.get('dependencies', {}).keys())
          for group in p.get('optional-dependencies', {}).values():
              deps.extend(group)
          normalized = {re.split('[^a-zA-Z0-9_-]', d)[0].lower() for d in deps if d}
          reqs = open('requirements-dev.txt').read().lower()
          missing = [d for d in normalized if d not in reqs]
          if missing:
              print(f'ERROR: Found in project.toml but missing in requirements.txt: {missing}'); exit(1)
          print('Consistency check passed: project.toml matches requirements.txt')"