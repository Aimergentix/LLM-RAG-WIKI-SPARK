changelog:
  exclude:
    authors:
      - dependabot[bot]
    labels:
      - ignore-for-release
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
    - title: "⚙️ Maintenance"
      labels:
        - dependencies
        - chore
        - documentation